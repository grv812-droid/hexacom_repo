trigger:
  branches:
    include:
      - main

pool:
  name: pool_hexacom

stages:
- stage: Terraform
  displayName: "Terraform Deployment"

  jobs:
  - job: TerraformInit
    displayName: "Terraform Init"

    steps:
    - task: TerraformInstaller@1
      displayName: "Install Terraform"
      inputs:
        terraformVersion: "latest"

    - task: TerraformTask@5
      displayName: "Terraform Init"
      inputs:
        provider: "azurerm"
        command: "init"
        workingDirectory: "$(System.DefaultWorkingDirectory)"

        backendServiceArm: "hexacom_svc"
        backendAzureRmOverrideSubscriptionID: "63be3bde-51fd-4708-9e65-0492e2dce693"
        backendAzureRmResourceGroupName: "hexacom_rg"
        backendAzureRmStorageAccountName: "hexacom12221"
        backendAzureRmContainerName: "hexa-con"
        backendAzureRmKey: "hexa_statefile.tfstate"
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'validate'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'hexacom_svc'
        environmentAzureRmOverrideSubscriptionID: '63be3bde-51fd-4708-9e65-0492e2dce693'
    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'apply'
        environmentServiceNameAzureRM: 'hexacom_svc'
        environmentAzureRmOverrideSubscriptionID: '63be3bde-51fd-4708-9e65-0492e2dce693'